upload_max_filesize = 5M
post_max_size = 20M
max_file_uploads = 20
max_input_vars = 300
max_input_time = 30
max_execution_time = 30
memory_limit = 128M
display_errors = Off
display_startup_errors = Off
html_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
expose_php = Off
allow_url_fopen = Off
allow_url_include = Off
cgi.fix_pathinfo = 0
enable_dl = Off
assert.active = 0
zend.assertions = -1
default_charset = "UTF-8"
mbstring.internal_encoding = UTF-8
mbstring.http_output = UTF-8
mbstring.encoding_translation = Off
mbstring.func_overload = 0
session.use_only_cookies = 1
session.use_strict_mode = 1
session.use_trans_sid = 0
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.sid_length = 48
session.sid_bits_per_character = 6
session.gc_maxlifetime = 28800
session.gc_probability = 1
session.gc_divisor = 100
session.cache_limiter = nocache
session.lazy_write = 1
open_basedir = /var/www/html:/var/www/uploads:/tmp
disable_functions = exec,passthru,shell_exec,system,proc_open,proc_close,proc_get_status,proc_nice,proc_terminate,popen,pcntl_exec,pcntl_fork,pcntl_signal,mail,curl_exec,curl_multi_exec,parse_ini_file,parse_ini_string,dl,putenv,show_source,highlight_file,opcache_get_status,opcache_get_configuration,phpinfo,posix_kill,posix_mkfifo,posix_setpgid,posix_setsid,posix_setuid,symlink,link

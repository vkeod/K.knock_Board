<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    ServerName localhost
    DocumentRoot /var/www/html/public
    LimitRequestBody 20971520
    LimitRequestFields 50
    LimitRequestFieldSize 8190
    LimitRequestLine 4094
    FileETag None
    TraceEnable Off

    <Directory />
        Require all denied
        Options None
        AllowOverride None
    </Directory>

    <Directory /var/www/html/public>
        Options -Indexes -FollowSymLinks +SymLinksIfOwnerMatch -ExecCGI -Includes -MultiViews
        AllowOverride AuthConfig FileInfo Limit Options=Indexes,SymLinksIfOwnerMatch,ExecCGI,Includes
        Require all granted
        <LimitExcept GET POST HEAD>
            Require all denied
        </LimitExcept>
    </Directory>

    <Directory /var/www/uploads>
        Require all denied
        Options None
        AllowOverride None
    </Directory>

    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    <FilesMatch "\.(env|env\..+|ini|sh|bash|yml|yaml|conf|sql|md|lock|bak|swp|swo|orig|log|backup|old|tmp|dist|sample|inc|phps)$">
        Require all denied
    </FilesMatch>

    <DirectoryMatch "/\.[^/]+">
        Require all denied
    </DirectoryMatch>

    <FilesMatch "\.(phtml|phar|php3|php4|php5|php6|php7|pht|phps|inc)$">
        Require all denied
    </FilesMatch>

    LogFormat "%h %l %u %t \"%m %U %H\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" noquery
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log noquery
</VirtualHost>
